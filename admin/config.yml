backend:
  name: github
  repo: ALFASHOOTER1/woordshare
  branch: main
  # تفعيل الربط المباشر بدون سيرفر وسيط
  auth_type: implicit
  app_id: YOUR_CLIENT_ID_HERE # ضع هنا رقم الـ Client ID الذي حصلت عليه من OAuth Apps في GitHub

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "software"
    label: "البرامج"
    folder: "content/software" # سيتم إنشاء المجلد تلقائياً
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "العنوان", name: "title", widget: "string" }
      - { label: "تاريخ النشر", name: "date", widget: "datetime" }
      - { label: "وصف البرنامج", name: "description", widget: "text" }
      - { label: "رابط التحميل", name: "download_url", widget: "string" }
      - { label: "الإصدار", name: "version", widget: "string" }
      - { label: "صورة البرنامج", name: "image", widget: "image" }
