<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة مدير WOORDSHARE</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    CMS.init({
      config: {
        backend: { name: 'github', repo: 'ALFASHOOTER1/woordshare', branch: 'main' },
        media_folder: 'assets/images',
        public_folder: '/assets/images',
        collections: [
          {
            name: 'blog',
            label: 'البرامج والمواضيع',
            folder: '_posts',
            create: true,
            fields: [
              { label: 'العنوان', name: 'title', widget: 'string' },
              { label: 'الوصف', name: 'description', widget: 'text' },
              { label: 'رابط التحميل', name: 'download_link', widget: 'string' },
              { label: 'الإصدار', name: 'version', widget: 'string', default: 'v1.0' },
              { label: 'الصورة', name: 'image', widget: 'image' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
