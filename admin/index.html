<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | WOORDSHARE</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'ALFASHOOTER1/woordshare',
          branch: 'main',
          auth_type: 'implicit', // هذا السطر هو ما يمنع ظهور نافذة Netlify
          app_id: 'Ov23liCGJl8mYHNlk4AD' // Client ID الخاص بك
        },
        load_config_file: false, // أمر صريح للمكتبة بتجاهل ملف config.yml الخارجي
        media_folder: 'assets/images',
        collections: [
          {
            name: 'software',
            label: 'البرامج',
            folder: 'content/software',
            create: true,
            fields: [
              { label: 'العنوان', name: 'title', widget: 'string' },
              { label: 'رابط التحميل', name: 'download_url', widget: 'string' },
              { label: 'الإصدار', name: 'version', widget: 'string' },
              { label: 'المحتوى', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
