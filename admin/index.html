<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم | WOORDSHARE</title>
</head>
<body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (window.CMS) {
                window.CMS.init({
                    config: {
                        backend: {
                            name: 'github',
                            repo: 'ALFASHOOTER1/woordshare',
                            branch: 'main',
                            auth_type: 'implicit',
                            app_id: 'Ov23liCGJl8mYHNlk4AD' // الـ Client ID الخاص بك
                        },
                        display_url: 'https://woordshare.com',
                        media_folder: 'assets/images',
                        collections: [
                            {
                                name: 'software',
                                label: 'البرامج',
                                folder: 'content/software',
                                create: true,
                                fields: [
                                    { label: 'العنوان', name: 'title', widget: 'string' },
                                    { label: 'رابط التحميل', name: 'download_url', widget: 'string' },
                                    { label: 'إصدار البرنامج', name: 'version', widget: 'string' },
                                    { label: 'المحتوى الأساسي', name: 'body', widget: 'markdown' }
                                ]
                            }
                        ]
                    }
                });
            }
        });
    </script>
</body>
</html>
